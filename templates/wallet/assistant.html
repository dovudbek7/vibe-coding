{% extends 'base.html' %}

{% block title %}Assistant | Wallet{% endblock %}

{% block content %}
<main class="mx-auto flex min-h-[calc(100vh-88px)] max-w-5xl flex-col px-4 py-8 sm:px-6">
  <section class="mb-6 flex items-end justify-between gap-4">
    <div>
      <p class="mb-2 text-sm font-semibold uppercase tracking-[0.2em] text-primary">Personal Wealth Advisor</p>
      <h1 class="font-headline text-4xl font-extrabold">Aura AI Assistant</h1>
    </div>
    <div class="rounded-full bg-green-50 px-4 py-2 text-sm font-semibold text-secondary">Logic-based insights</div>
  </section>

  <section class="flex flex-1 flex-col rounded-[2rem] bg-white p-6 shadow-panel">
    <div class="flex-1 space-y-5 overflow-y-auto pr-1">
      {% for item in chat_history %}
        <div class="flex {% if item.role == 'user' %}justify-end{% endif %}">
          <div class="max-w-[85%] rounded-[1.75rem] px-5 py-4 {% if item.role == 'user' %}signature-gradient text-white{% else %}bg-surface-low text-slate-800{% endif %}">
            <p class="text-sm font-semibold uppercase tracking-[0.2em] {% if item.role == 'user' %}text-white/70{% else %}text-primary{% endif %}">
              {{ item.role }}
            </p>
            <p class="mt-2 leading-7">{{ item.message }}</p>
          </div>
        </div>
      {% endfor %}
    </div>

    <form class="mt-6 flex gap-3" method="post">
      {% csrf_token %}
      <input class="flex-1 rounded-2xl border-0 bg-surface-low px-4 py-4 focus:ring-2 focus:ring-primary/20" name="message" placeholder="Ask about balance, income, or spending..." type="text" required />
      <button class="signature-gradient rounded-2xl px-5 py-4 font-semibold text-white" type="submit">Send</button>
    </form>
  </section>
</main>
{% endblock %}
